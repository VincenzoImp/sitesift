# Deterministic rules — decide site_type only (never topic), first match wins.
# Keep every rule high-precision (>= 0.95 on the eval set) or lower its confidence
# below the acceptance threshold. Topic requires semantic understanding (the LLM).
version: "1"
rules:
  - id: gov_via_tld
    when:
      any:
        - {field: host, ends_with: [".gov", ".gov.it", ".gov.uk", ".gov.au", ".mil",
                                     ".europa.eu", ".gc.ca", ".gouv.fr"]}
    then: {site_type: government, confidence: 0.97,
           evidence: "government TLD"}

  # Scholarly markup is a stronger signal than the .edu TLD (universities host
  # both), so this must precede edu_via_tld.
  - id: academic_via_jsonld
    when:
      any:
        - {field: jsonld_types, contains_any: [ScholarlyArticle, Dataset, Thesis]}
    then: {site_type: academic_research, confidence: 0.90,
           evidence: "JSON-LD scholarly markup"}

  - id: edu_via_tld
    when:
      any:
        - {field: host, ends_with: [".edu", ".ac.uk", ".edu.au", ".ac.jp", ".ac.in"]}
    then: {site_type: education, confidence: 0.92,
           evidence: "education TLD"}

  - id: wiki_via_host
    when:
      any:
        - {field: host, ends_with: ["wikipedia.org", "wikimedia.org", "fandom.com",
                                     "wikihow.com", "wiktionary.org"]}
    then: {site_type: reference_wiki, confidence: 0.95,
           evidence: "known reference/wiki host"}

  - id: ecommerce_via_platform
    when:
      all:
        - {field: ecommerce_platform, is_not_null: true}
        - any:
            - {field: has_cart_link, eq: true}
            - {field: price_patterns, gte: 5}
    then: {site_type: ecommerce, confidence: 0.95,
           evidence: "e-commerce platform + cart/prices"}

  - id: news_via_jsonld
    when:
      all:
        - {field: jsonld_types, contains_any: [NewsArticle, ReportageNewsArticle,
                                               LiveBlogPosting, NewsMediaOrganization]}
        - {field: feeds, min_len: 1}
    then: {site_type: news_outlet, confidence: 0.92,
           evidence: "JSON-LD NewsArticle + RSS/Atom feed"}

  - id: forum_via_jsonld
    when:
      any:
        - {field: jsonld_types, contains_any: [DiscussionForumPosting, QAPage]}
    then: {site_type: forum_community, confidence: 0.90,
           evidence: "JSON-LD forum/Q&A markup"}

  - id: ecommerce_via_product
    when:
      all:
        - {field: jsonld_types, contains_any: [Product, AggregateOffer]}
        - {field: has_cart_link, eq: true}
    then: {site_type: ecommerce, confidence: 0.90,
           evidence: "JSON-LD Product + cart link"}
