name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src/ tests/ eval/
      - name: Format check
        run: uv run ruff format --check src/ tests/ eval/
      - name: Typecheck
        run: uv run mypy
      - name: Test
        run: uv run pytest -q
        # The eval harness now needs an LLM provider, so accuracy is measured with
        # `sitesift eval --provider ollama` locally, not in CI. Its offline
        # machinery is exercised deterministically by tests/integration/test_eval.py.
